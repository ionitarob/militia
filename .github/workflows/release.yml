# ─────────────────────────────────────────────────────────────────────────────
# IMLiti – Build & Release macOS + Windows
# Triggered manually with a version input or automatically on push to main
# ─────────────────────────────────────────────────────────────────────────────
name: Release Desktop Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.2)"
        required: false
        type: string

permissions:
  contents: read

env:
  AWS_REGION: eu-west-3
  S3_BUCKET: imliti-scrapes-340303438174
  FLUTTER_BASE: https://storage.googleapis.com/flutter_infra_release/releases

jobs:
  # ═════════════════════════════════════════════════════════════════════════════
  #  macOS build
  # ═════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version_step.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Version
        id: version_step
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep '^version: ' frontend/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Install Flutter 3.41.5
        run: |
          curl -fsSL -o /tmp/flutter.zip \
            "$FLUTTER_BASE/stable/macos/flutter_macos_arm64_3.41.5-stable.zip"
          unzip -q /tmp/flutter.zip -d "$HOME"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          rm /tmp/flutter.zip

      - name: Verify Flutter
        run: |
          flutter --version
          dart --version

      - name: Bump version
        working-directory: frontend
        run: |
          sed -i '' -E "s/^version: [0-9]+\.[0-9]+\.[0-9]+\+[0-9]+/version: ${{ env.VERSION }}+1/" pubspec.yaml

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build macOS release
        working-directory: frontend
        run: flutter build macos --release -- CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Package .app bundle
        working-directory: frontend/build/macos/Build/Products/Release
        run: |
          APP_BUNDLE=$(find . -maxdepth 1 -name "*.app" | head -1)
          zip -r --symlinks /tmp/imliti-${{ env.VERSION }}-macos.zip "$APP_BUNDLE"
          echo "ZIP_SIZE=$(du -sh /tmp/imliti-${{ env.VERSION }}-macos.zip | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp /tmp/imliti-${{ env.VERSION }}-macos.zip \
            "s3://$S3_BUCKET/app/macos/imliti-${{ env.VERSION }}.zip" \
            --region $AWS_REGION \
            --content-type "application/zip"

      - name: Output download URL
        run: |
          echo "### ✅ macOS build uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ env.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Size:** $ZIP_SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://$S3_BUCKET.s3.$AWS_REGION.amazonaws.com/app/macos/imliti-${{ env.VERSION }}.zip" >> "$GITHUB_STEP_SUMMARY"

  # ═════════════════════════════════════════════════════════════════════════════
  #  Windows build
  # ═════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version_step.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Version
        id: version_step
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $pubspec = Get-Content frontend/pubspec.yaml -Raw
            if ($pubspec -match 'version:\s*([^\+\s]+)') {
              $version = $Matches[1]
            } else {
              $version = "1.0.1"
            }
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $version"

      - name: Install Flutter 3.41.5
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "$env:FLUTTER_BASE/stable/windows/flutter_windows_3.41.5-stable.zip" -OutFile "$env:TEMP\flutter.zip"
          Expand-Archive -Path "$env:TEMP\flutter.zip" -DestinationPath "C:\" -Force
          echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Remove-Item "$env:TEMP\flutter.zip"

      - name: Verify Flutter
        run: |
          flutter --version
          dart --version

      - name: Bump version
        working-directory: frontend
        shell: pwsh
        run: |
          $content = Get-Content pubspec.yaml -Raw
          $content = $content -replace 'version: \d+\.\d+\.\d+\+\d+', "version: ${{ env.VERSION }}+1"
          Set-Content pubspec.yaml -Value $content -NoNewline

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows release
        working-directory: frontend
        run: flutter build windows --release

      - name: Package release
        shell: pwsh
        run: |
          $releaseDir = "frontend/build/windows/x64/runner/Release"
          $zipPath = "$env:TEMP/imliti-${{ env.VERSION }}-windows.zip"
          Compress-Archive -Path "$releaseDir/*" -DestinationPath $zipPath -Force
          $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV
          echo "ZIP_SIZE=${sizeMB}MB" >> $env:GITHUB_ENV

      - name: Upload to S3
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp "$ZIP_PATH" \
            "s3://$S3_BUCKET/app/windows/imliti-${{ env.VERSION }}.zip" \
            --region $AWS_REGION \
            --content-type "application/zip"

      - name: Output download URL
        shell: bash
        run: |
          echo "### ✅ Windows build uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ env.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Size:** $ZIP_SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://$S3_BUCKET.s3.$AWS_REGION.amazonaws.com/app/windows/imliti-${{ env.VERSION }}.zip" >> "$GITHUB_STEP_SUMMARY"

  # ═════════════════════════════════════════════════════════════════════════════
  #  Update latest.json manifest (runs after both builds succeed)
  # ═════════════════════════════════════════════════════════════════════════════
  update-manifest:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Update latest.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          VERSION: ${{ needs.build-macos.outputs.version }}
        run: |
          MANIFEST_KEY="app/latest.json"
          EXISTING=$(aws s3 cp "s3://$S3_BUCKET/$MANIFEST_KEY" - --region $AWS_REGION 2>/dev/null || echo '{}')
          NOTES=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('notes',''))" 2>/dev/null || echo "")

          NEW_MANIFEST=$(python3 - <<PYEOF
          import json
          manifest = {
              "version": "${{ env.VERSION }}",
              "notes": "${NOTES}",
              "macos": "https://${{ env.S3_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com/app/macos/imliti-${{ env.VERSION }}.zip",
              "windows": "https://${{ env.S3_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com/app/windows/imliti-${{ env.VERSION }}.zip",
          }
          print(json.dumps(manifest, indent=2))
          PYEOF
          )

          echo "$NEW_MANIFEST" | aws s3 cp - "s3://$S3_BUCKET/$MANIFEST_KEY" \
            --region $AWS_REGION \
            --content-type "application/json"

          echo "### 📋 Manifest updated" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$NEW_MANIFEST" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
